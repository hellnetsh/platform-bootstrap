apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-hellnetsh
spec:
  provider:
    vault:
      server: https://vault.hellnet.com.br:8200
      path: kv
      version: v2
      caProvider:
        type: ConfigMap
        name: vault-ca-bundle
        namespace: external-secrets
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso
          serviceAccountRef:
            name: vault-auth
            namespace: kube-system
            audiences:
              - vault
