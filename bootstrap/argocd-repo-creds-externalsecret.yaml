apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-hellnetsh-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-hellnetsh
    kind: ClusterSecretStore
  target:
    name: github-hellnetsh-repo-creds
    creationPolicy: Merge
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
  data:
    - secretKey: username
      remoteRef:
        key: idp/argocd/repo-creds
        property: username
    - secretKey: password
      remoteRef:
        key: idp/argocd/repo-creds
        property: password
    - secretKey: url
      remoteRef:
        key: idp/argocd/repo-creds
        property: url
