apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hellnetsh
  namespace: argocd
spec:
  description: Hellnetsh org apps
  sourceRepos:
    - https://github.com/hellnetsh/*
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
